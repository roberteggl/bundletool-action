name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Format
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm ci-test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Test Local Action (dry-run)
        id: test-action-dry-run
        uses: ./
        with:
          aab-file: __fixtures__/android/install-time-permanent-modules.aab
          sign: false
          dry-run: true
          verbose: true

      - name: Assert dry-run version output
        run: |
          test -n "${{ steps.test-action-dry-run.outputs.bundletool-version }}"
          test -n "${{ steps.test-action-dry-run.outputs.apks-path }}"
          test -n "${{ steps.test-action-dry-run.outputs.apk-path }}"
          echo "Resolved ${{ steps.test-action-dry-run.outputs.bundletool-version }}"
          echo "Planned APKS ${{ steps.test-action-dry-run.outputs.apks-path }}"
          echo "Planned APK ${{ steps.test-action-dry-run.outputs.apk-path }}"

      - name: Build universal APK from fixture AAB
        id: test-universal-apk
        uses: ./
        with:
          aab-file: __fixtures__/android/install-time-permanent-modules.aab
          bundletool-version: '1.18.3'
          sign: false
          mode: universal
          extract-universal-apk: true
          keep-apks: true
          verbose: true

      - name: Assert universal APK outputs
        run: |
          test -n "${{ steps.test-universal-apk.outputs.bundletool-version }}"
          test -f "${{ steps.test-universal-apk.outputs.bundletool-path }}"
          test -f "${{ steps.test-universal-apk.outputs.apks-path }}"
          test -s "${{ steps.test-universal-apk.outputs.apk-path }}"
          file "${{ steps.test-universal-apk.outputs.apk-path }}" | grep -qiE 'zip archive|android package'

      - name: Build signed universal APK from fixture AAB
        id: test-signed-universal-apk
        uses: ./
        with:
          aab-file: __fixtures__/android/install-time-permanent-modules.aab
          bundletool-version: '1.18.3'
          sign: true
          keystore: ${{ env.HOME }}/.android/debug.keystore
          keystore-password: android
          key-alias: androiddebugkey
          key-password: android
          mode: universal
          extract-universal-apk: true
          verbose: true

      - name: Assert signed universal APK outputs
        run: |
          test -n "${{ steps.test-signed-universal-apk.outputs.bundletool-version }}"
          test -s "${{ steps.test-signed-universal-apk.outputs.apk-path }}"
          jarsigner -verify "${{ steps.test-signed-universal-apk.outputs.apk-path }}"

      - name: Build split APK set for extract-apks
        id: test-build-apks
        uses: ./
        with:
          aab-file: __fixtures__/android/install-time-permanent-modules.aab
          bundletool-version: '1.18.3'
          sign: false
          mode: default
          extract-universal-apk: false
          keep-apks: true
          verbose: true

      - name: Extract device-specific APKs
        id: test-extract-apks
        uses: ./
        with:
          command: extract-apks
          apks-file: ${{ steps.test-build-apks.outputs.apks-path }}
          device-spec: __fixtures__/android/pixel2_spec.json
          output-dir: ${{ runner.temp }}/extracted-apks
          bundletool-version: '1.18.3'
          verbose: true

      - name: Assert extract-apks outputs
        run: |
          test -d "${{ steps.test-extract-apks.outputs.output-dir }}"
          test "$(find "${{ steps.test-extract-apks.outputs.output-dir }}" -name '*.apk' | wc -l)" -ge 1
